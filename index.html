<!DOCTYPE html>
<html dir="ltr">
<head>
    <title>LifeRP Calculators</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 50px 20px;
            box-sizing: border-box;
            flex: 1;
        }
        h1 {
            font-size: 2.2rem;
            text-align: center;
            background: linear-gradient(to right, #00ffcc, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }
        .calc-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .calc-card:hover {
            border-color: #00ffcc;
            transform: translateY(-3px);
            background-color: #252525;
        }
        .calc-info h3 {
            margin: 0;
            color: #00ffcc;
            font-size: 1.3rem;
        }
        .calc-info p {
            margin: 8px 0 0 0;
            font-size: 0.9rem;
            color: #888;
        }
        .arrow {
            font-size: 1.5rem;
            color: #00ffcc;
        }
        footer {
            padding: 30px 0;
            font-size: 0.85rem;
            color: #444;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LifeRP Calculators</h1>
        <a href="https://nylexliferp.github.io/calculators/datachip" class="calc-card">
            <div class="calc-info">
                <h3>Datachip Price Calculator</h3>
                <p>Calculate profits & prices for Normal and Gold datachips</p>
            </div>
            <div class="arrow">➜</div>
        </a>
    </div>
    <footer>
        All Rights Reserved &copy; 2026 ninioteam.dev
    </footer>
</body>
</html>
