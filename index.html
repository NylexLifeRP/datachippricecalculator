<!DOCTYPE html>
<html dir="ltr">
<head>
    <title>Datachip Calculator Grid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .prices-box { grid-row: span 4; }
        h3 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #00ffcc; text-align: center; margin-top: 0; }
        .gold-title { color: #ffd700; border-color: #ffd700; }
        p { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 0.9rem; }
        input {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            width: 70px;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #00ffcc; }
        hr { border: 0; border-top: 1px dashed #444; margin: 15px 0; }
        .res-val { font-size: 1.2rem; font-weight: bold; display: block; margin-top: 5px; }
        .pos { color: #00ff88; }
        .neg { color: #ff4444; }

        @media (max-width: 600px) {
            .grid-wrapper { display: flex; flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

<div class="grid-wrapper">
    <!-- 1: PRICES (Span Left Side) -->
    <div class="container prices-box">
        <h3>Prices</h3>
        <p>Norm Sell: <input type="text" id="s_n" value="2500" oninput="update()"></p>
        <p>Gold Sell: <input type="text" id="s_g" value="10000" oninput="update()"></p>
        <hr>
        <p>Iron: <input type="text" id="p_i" value="500" oninput="update()"></p>
        <p>Gold: <input type="text" id="p_g" value="600" oninput="update()"></p>
        <p>Diamond: <input type="text" id="p_d" value="2000" oninput="update()"></p>
        <p>Chemical: <input type="text" id="p_c" value="127" oninput="update()"></p>
        <p>Glue: <input type="text" id="p_gl" value="18" oninput="update()"></p>
        <p>Tape: <input type="text" id="p_t" value="5" oninput="update()"></p>
        <p>Scrap: <input type="text" id="p_m" value="13" oninput="update()"></p>
    </div>

    <!-- 2: NORMAL CHIP (Top Right) -->
    <div class="container">
        <h3>Normal Chip</h3>
        <p>Amount: <input type="text" id="a_n" value="1" oninput="update()"></p>
        <hr>
        <span>Profit:</span>
        <span id="res_n" class="res-val">$0</span>
        <p style="color:#888; font-size:0.8rem;">Spend: <span id="sp_n">$0</span></p>
    </div>

    <!-- 3: GOLD CHIP (Bottom Right) -->
    <div class="container">
        <h3 class="gold-title">Gold Chip</h3>
        <p>Amount: <input type="text" id="a_g" value="1" oninput="update()"></p>
        <hr>
        <span>Profit:</span>
        <span id="res_g" class="res-val">$0</span>
        <p style="color:#888; font-size:0.8rem;">Spend: <span id="sp_g">$0</span></p>
    </div>
</div>

<script>
    function update() {
        const v = id => parseFloat(document.getElementById(id).value) || 0;
        
        const iron = v('p_i'), gold = v('p_g'), diam = v('p_d'), chem = v('p_c'), glue = v('p_gl'), tape = v('p_t'), metal = v('p_m');
        const sn = v('s_n'), sg = v('s_g');
        const an = v('a_n'), ag = v('a_g');

        const costN = (iron * 2) + gold + chem + glue + tape + (metal * 6);
        const profitN = (sn - costN) * an;

        const costG = costN + diam + (iron * 2) + gold + (chem * 2) + (glue * 2) + (tape * 2) + (metal * 4);
        const profitG = (sg - costG) * ag;

        document.getElementById('res_n').innerText = "$" + Math.floor(profitN).toLocaleString();
        document.getElementById('res_n').className = "res-val " + (profitN >= 0 ? "pos" : "neg");
        document.getElementById('sp_n').innerText = "$" + Math.floor(costN * an).toLocaleString();

        document.getElementById('res_g').innerText = "$" + Math.floor(profitG).toLocaleString();
        document.getElementById('res_g').className = "res-val " + (profitG >= 0 ? "pos" : "neg");
        document.getElementById('sp_g').innerText = "$" + Math.floor(costG * ag).toLocaleString();
    }
    update();
</script>

</body>
</html>
