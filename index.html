<!DOCTYPE html>
<html dir="ltr">
<head>
    <title>Datachip Calculator Grid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .prices-box { grid-row: span 2; }
        h3 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #00ffcc; text-align: center; margin-top: 0; }
        .gold-title { color: #ffd700; border-color: #ffd700; }
        p { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 0.9rem; }
        input {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            width: 85px;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #00ffcc; }
        hr { border: 0; border-top: 1px dashed #444; margin: 15px 0; }
        .stat-row { margin: 8px 0; }
        .stat-label { font-size: 0.85rem; color: #aaa; display: block; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }
        .profit-val { font-size: 1.4rem; }
        .pos { color: #00ff88; }
        .neg { color: #ff4444; }

        @media (max-width: 700px) {
            .grid-wrapper { display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="grid-wrapper">
    <div class="container prices-box">
        <h3>Material Prices</h3>
        <p>Norm Sell: <input type="text" id="s_n" value="2500" oninput="update()"></p>
        <p>Gold Sell: <input type="text" id="s_g" value="5000" oninput="update()"></p>
        <hr>
        <p>Iron: <input type="text" id="p_i" value="450" oninput="update()"></p>
        <p>Gold: <input type="text" id="p_g" value="500" oninput="update()"></p>
        <p>Diamond: <input type="text" id="p_d" value="600" oninput="update()"></p>
        <p>Chemical: <input type="text" id="p_c" value="127" oninput="update()"></p>
        <p>Glue: <input type="text" id="p_gl" value="18" oninput="update()"></p>
        <p>Tape: <input type="text" id="p_t" value="5" oninput="update()"></p>
        <p>Scrap: <input type="text" id="p_m" value="0" oninput="update()"></p>
    </div>

    <div class="container">
        <h3>Normal Chip</h3>
        <p>Amount: <input type="text" id="a_n" value="1" oninput="update()"></p>
        <hr>
        <div class="stat-row">
            <span class="stat-label">Revenue:</span>
            <span id="rev_n" class="stat-val">$0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Cost:</span>
            <span id="sp_n" class="stat-val" style="color: #ffaa00;">$0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Profit:</span>
            <span id="res_n" class="stat-val profit-val">$0</span>
        </div>
    </div>

    <div class="container">
        <h3 class="gold-title">Gold Chip</h3>
        <p>Amount: <input type="text" id="a_g" value="1" oninput="update()"></p>
        <hr>
        <div class="stat-row">
            <span class="stat-label">Revenue:</span>
            <span id="rev_g" class="stat-val">$0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Cost:</span>
            <span id="sp_g" class="stat-val" style="color: #ffaa00;">$0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Profit:</span>
            <span id="res_g" class="stat-val profit-val">$0</span>
        </div>
    </div>
</div>

<script>
    function formatNum(num) {
        const sign = num < 0 ? "-" : "";
        num = Math.abs(num);
        const units = ["K", "M", "B", "T", "Q"];
        
        if (num < 1000) return sign + "$" + num.toFixed(2);
        
        let unitIdx = -1;
        while (num >= 1000 && unitIdx < units.length - 1) {
            num /= 1000;
            unitIdx++;
        }
        return sign + "$" + num.toFixed(2) + units[unitIdx];
    }

    function update() {
        const v = id => parseFloat(document.getElementById(id).value) || 0;
        
        const iron = v('p_i'), gold = v('p_g'), diam = v('p_d'), chem = v('p_c'), glue = v('p_gl'), tape = v('p_t'), metal = v('p_m');
        const sn = v('s_n'), sg = v('s_g');
        const an = v('a_n'), ag = v('a_g');

        const costNPerUnit = (iron * 2) + gold + chem + glue + tape + (metal * 6);
        const revN = sn * an;
        const spendN = costNPerUnit * an;
        const profitN = revN - spendN;

        const costGPerUnit = costNPerUnit + diam + (iron * 2) + gold + (chem * 2) + (glue * 2) + (tape * 2) + (metal * 4);
        const revG = sg * ag;
        const spendG = costGPerUnit * ag;
        const profitG = revG - spendG;

        document.getElementById('rev_n').innerText = formatNum(revN);
        document.getElementById('sp_n').innerText = formatNum(spendN);
        document.getElementById('res_n').innerText = formatNum(profitN);
        document.getElementById('res_n').className = "stat-val profit-val " + (profitN >= 0 ? "pos" : "neg");

        document.getElementById('rev_g').innerText = formatNum(revG);
        document.getElementById('sp_g').innerText = formatNum(spendG);
        document.getElementById('res_g').innerText = formatNum(profitG);
        document.getElementById('res_g').className = "stat-val profit-val " + (profitG >= 0 ? "pos" : "neg");
    }
    update();
</script>

</body>
</html>
