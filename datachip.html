<!DOCTYPE html>
<html dir="ltr">
<head>
    <title>Datachip Calculator Grid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            position: relative;
        }
        .prices-box { grid-row: span 2; }
        h3 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #00ffcc; text-align: center; margin-top: 0; }
        .gold-title { color: #ffd700; border-color: #ffd700; }
        p { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 0.9rem; }
        input {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            width: 85px;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #00ffcc; }
        hr { border: 0; border-top: 1px dashed #444; margin: 15px 0; }
        .stat-row { margin: 8px 0; }
        .stat-label { font-size: 0.85rem; color: #aaa; display: block; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }
        .profit-val { font-size: 1.4rem; }
        .pos { color: #00ff88; }
        .neg { color: #ff4444; }
        .stat-val[style*="cursor: pointer"] { cursor: pointer; }

        .tooltip {
            position: absolute;
            background-color: #222;
            color: #fff; /* tooltip text white */
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #0ff;
            font-size: 0.85rem;
            white-space: pre-line;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 100;
        }

        .footer-credit {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 0.85rem;
            color: #555;
        }

        @media (max-width: 700px) {
            .grid-wrapper { display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>  
    <div class="grid-wrapper">
        <div class="container prices-box">
            <h3>Material Prices</h3>
            <p>Norm Sell: <input type="text" id="s_n" value="2500" oninput="update()"></p>
            <p>Gold Sell: <input type="text" id="s_g" value="5000" oninput="update()"></p>
            <hr>
            <p>Iron: <input type="text" id="p_i" value="450" oninput="update()"></p>
            <p>Gold: <input type="text" id="p_g" value="500" oninput="update()"></p>
            <p>Diamond: <input type="text" id="p_d" value="600" oninput="update()"></p>
            <p>Chemical: <input type="text" id="p_c" value="127" oninput="update()"></p>
            <p>Glue: <input type="text" id="p_gl" value="18" oninput="update()"></p>
            <p>Tape: <input type="text" id="p_t" value="5" oninput="update()"></p>
            <p>Scrap: <input type="text" id="p_m" value="0" oninput="update()"></p>
        </div>
    
        <div class="container">
            <h3>Datachip</h3>
            <p>Amount: <input type="text" id="a_n" value="1" oninput="update()"></p>
            <hr>
            <div class="stat-row">
                <span class="stat-label">Revenue:</span>
                <span id="rev_n" class="stat-val">$0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Cost:</span>
                <span id="sp_n" class="stat-val" style="color: #ffaa00; cursor: pointer;">$0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Profit:</span>
                <span id="res_n" class="stat-val profit-val">$0</span>
            </div>
        </div>
    
        <div class="container">
            <h3 class="gold-title">Gold Chip</h3>
            <p>Amount: <input type="text" id="a_g" value="1" oninput="update()"></p>
            <hr>
            <div class="stat-row">
                <span class="stat-label">Revenue:</span>
                <span id="rev_g" class="stat-val">$0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Cost:</span>
                <span id="sp_g" class="stat-val" style="color: #ffaa00; cursor: pointer;">$0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Profit:</span>
                <span id="res_g" class="stat-val profit-val">$0</span>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <div class="footer-credit">
        All Rights Reserved @ 2026 ninioteam.dev
    </div>
    
    <script>
        const tooltip = document.getElementById('tooltip');

        function formatNum(num) {
            const sign = num < 0 ? "-" : "";
            num = Math.abs(num);
            const units = ["K", "M", "B", "T", "Q"];
            if (num < 1000) return sign + "$" + num.toFixed(2);
            let unitIdx = -1;
            while (num >= 1000 && unitIdx < units.length - 1) {
                num /= 1000;
                unitIdx++;
            }
            return sign + "$" + num.toFixed(2) + units[unitIdx];
        }

        function setTooltip(el, lines) {
            el.addEventListener('mouseenter', e => {
                tooltip.innerText = lines.map(([amt, name, price]) =>
                    `${amt}x ${name} - $${price.toLocaleString(undefined, {maximumFractionDigits:2})}`
                ).join("\n");
                const rect = el.getBoundingClientRect();
                tooltip.style.left = rect.left + window.scrollX + "px";
                tooltip.style.top = rect.bottom + window.scrollY + 5 + "px";
                tooltip.style.opacity = 1;
            });
            el.addEventListener('mouseleave', () => tooltip.style.opacity = 0);

            el.addEventListener('click', () => {
                const text = lines.map(([amt, name]) => `${amt}x ${name} Requirements:`).join("\n");
                navigator.clipboard.writeText(text).then(() => {
                    alert('Requirements copied to clipboard!');
                });
            });
        }

        function update() {
            const v = (id, def) => {
                const val = parseFloat(document.getElementById(id).value);
                return isNaN(val) ? def : val;
            };

            const iron = v('p_i', 450), gold = v('p_g', 500), diam = v('p_d', 600), 
                  chem = v('p_c', 127), glue = v('p_gl', 18), tape = v('p_t', 5), metal = v('p_m', 0);

            const sn = v('s_n', 2500), sg = v('s_g', 5000), an = v('a_n', 1), ag = v('a_g', 1);

            const costN = (iron*2) + gold + chem + glue + tape + (metal*6);
            const revN = sn*an, spendN = costN*an, profitN = revN-spendN;

            const costG = costN + diam + (iron*2) + gold + (chem+glue+tape)*2 + (metal*4);
            const revG = sg*ag, spendG = costG*ag, profitG = revG-spendG;

            document.getElementById('rev_n').innerText = formatNum(revN);

            const spNEl = document.getElementById('sp_n');
            spNEl.innerText = formatNum(spendN);
            setTooltip(spNEl, [
                [2*an,"Iron", formatNum(iron*2*an)],
                [1*an,"Gold", formatNum(gold*an)],
                [1*an,"Soot Rubber", formatNum((chem+glue+tape)*an)],
                [1*an,"Metal Sheet", formatNum(1*an)],
                [4*an,"Metal Bar", formatNum(4*an)],
                [2*an,"Scrap Metal", formatNum(2*an)]
            ]);

            document.getElementById('res_n').innerText = formatNum(profitN);
            document.getElementById('res_n').className =
                "stat-val profit-val " + (profitN>=0?"pos":"neg");

            document.getElementById('rev_g').innerText = formatNum(revG);

            const spGEl = document.getElementById('sp_g');
            spGEl.innerText = formatNum(spendG);
            setTooltip(spGEl, [
                [1*ag,"Datachip", formatNum(costN*ag)],
                [1*ag,"Diamond", formatNum(diam*ag)],
                [2*ag,"Iron", formatNum(iron*2*ag)],
                [1*ag,"Gold", formatNum(gold*ag)],
                [1*ag,"Soot Rubber", formatNum((chem+glue+tape)*2*ag)],
                [1*an,"Metal Sheet", formatNum(1*an)],
                [2*an,"Scrap Metal", formatNum(2*an)]
            ]);

            document.getElementById('res_g').innerText = formatNum(profitG);
            document.getElementById('res_g').className =
                "stat-val profit-val " + (profitG>=0?"pos":"neg");
        }

        update();
    </script>
</body>
</html>
